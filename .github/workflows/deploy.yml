name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'config/**'
      - 'data/**'
      - 'packages/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: cd apps/web && npm install --no-audit --no-fund && npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out
      - id: deployment
        uses: actions/deploy-pages@v4
